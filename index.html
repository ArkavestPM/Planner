<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 پلنر شخصی من</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .hidden { display: none !important; }
        
        /* استایل‌های ورود */
        #auth-section {
            max-width: 500px;
            margin: 50px auto;
        }
        #auth-section h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .auth-box {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-secondary { background: #6b7280; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .card h4 { color: #333; margin-bottom: 10px; }
        .card h5 { color: #555; margin: 10px 0; }
        .card h6 { color: #666; margin: 8px 0; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .container { padding: 15px; }
        }
        
        /* تب‌ها */
        .tab-bar {
            display: flex;
            gap: 5px;
            border-bottom: 3px solid #e5e7eb;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            color: #6b7280;
            transition: all 0.3s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-size: 15px;
        }
        .tab:hover { color: #333; }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* وضعیت‌ها */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        
        /* هدر */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f3f4f6;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            color: #333;
            font-size: 24px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .user-info span {
            color: #6b7280;
            font-weight: 500;
        }
        
        /* فرم‌های درون خطی */
        .inline-form {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .inline-form .form-group {
            margin-bottom: 12px;
        }
        .inline-form .form-group:last-child {
            margin-bottom: 0;
        }
        
        /* تقویم */
        .calendar-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .calendar-wrapper {
                grid-template-columns: 1fr;
            }
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-top: 15px;
        }
        .calendar-grid .day {
            padding: 15px 5px;
            text-align: center;
            border-radius: 8px;
            background: #f9fafb;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            position: relative;
        }
        .calendar-grid .day:hover {
            background: #e5e7eb;
            transform: scale(1.05);
        }
        .calendar-grid .day.today {
            background: #667eea;
            color: white;
            font-weight: bold;
        }
        .calendar-grid .day.weekend {
            background: #fee2e2;
        }
        .calendar-grid .day.has-event {
            border: 2px solid #667eea;
        }
        .calendar-grid .day .event-dot {
            width: 6px;
            height: 6px;
            background: #667eea;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
        }
        .calendar-grid .day.today .event-dot {
            background: white;
        }
        .calendar-grid .day.selected {
            background: #dbeafe;
            border: 2px solid #667eea;
        }
        .calendar-grid .day.off-day {
            background: #fef3c7;
            color: #92400e;
        }
        .calendar-grid .day.off-day::after {
            content: '✗';
            position: absolute;
            top: -4px;
            right: 2px;
            font-size: 10px;
            color: #ef4444;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-header .month-year {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        /* لیست رویدادها */
        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 8px;
            border-right: 4px solid #667eea;
            transition: all 0.2s;
        }
        .event-item:hover {
            background: #f3f4f6;
        }
        .event-item .event-info {
            flex: 1;
        }
        .event-item .event-title {
            font-weight: 600;
            color: #333;
        }
        .event-item .event-time {
            font-size: 12px;
            color: #6b7280;
        }
        .event-item .event-type {
            font-weight: 600;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 12px;
            background: #dbeafe;
            color: #1e40af;
        }
        .event-item .event-actions {
            display: flex;
            gap: 5px;
        }
        
        /* مالی */
        .finance-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .finance-card {
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .finance-card.income { background: #d1fae5; }
        .finance-card.expense { background: #fee2e2; }
        .finance-card.balance { background: #dbeafe; }
        .finance-card .amount {
            font-size: 24px;
            font-weight: 700;
        }
        .finance-card .label {
            font-size: 14px;
            color: #6b7280;
        }
        
        /* انیمیشن‌ها */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        /* اسکرول */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* روزهای هفته */
        .weekday-names {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 5px;
        }
        .weekday-names div {
            text-align: center;
            font-weight: bold;
            color: #6b7280;
            padding: 5px;
            font-size: 13px;
        }

        /* فرم ثبت سریع */
        .quick-add-form {
            background: #f9fafb;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .quick-add-form .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }
        @media (max-width: 768px) {
            .quick-add-form .form-row {
                grid-template-columns: 1fr;
            }
        }
        .quick-add-form .form-row .form-group {
            margin-bottom: 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .empty-state h3 {
            color: #333;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        
        <!-- ===== بخش ورود ===== -->
        <div id="auth-section">
            <h2>📅 پلنر شخصی</h2>
            <div id="auth-message" style="margin-bottom: 15px;"></div>
            
            <div class="auth-box">
                <h3 style="margin-bottom: 20px;">🔐 ورود</h3>
                <div class="form-group">
                    <label>📧 ایمیل</label>
                    <input type="email" id="login-email" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>🔑 رمز عبور</label>
                    <input type="password" id="login-password" placeholder="رمز عبور">
                </div>
                <button class="btn btn-primary" onclick="login()" style="width: 100%;">ورود</button>
                <p style="text-align: center; margin-top: 15px; color: #6b7280;">
                    حساب ندارید؟ <a href="#" onclick="document.getElementById('register-form').classList.toggle('hidden')" style="color: #667eea; font-weight: 600;">ثبت‌نام</a>
                </p>
            </div>
            
            <div id="register-form" class="auth-box hidden">
                <h3 style="margin-bottom: 20px;">📝 ثبت‌نام</h3>
                <div class="form-group">
                    <label>📧 ایمیل</label>
                    <input type="email" id="register-email" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>🔑 رمز عبور</label>
                    <input type="password" id="register-password" placeholder="حداقل ۶ کاراکتر">
                </div>
                <button class="btn btn-success" onclick="register()" style="width: 100%;">ثبت‌نام</button>
            </div>
        </div>

        <!-- ===== بخش اصلی ===== -->
        <div id="planner-section" class="hidden">
            
            <!-- هدر -->
            <div class="header">
                <h1>📅 پلنر شخصی</h1>
                <div class="user-info">
                    <span>👤 <span id="user-name">کاربر</span></span>
                    <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
                </div>
            </div>

            <!-- تب‌ها -->
            <div class="tab-bar">
                <button class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 داشبورد</button>
                <button class="tab" data-tab="goals" onclick="switchTab('goals')">🎯 اهداف</button>
                <button class="tab" data-tab="calendar" onclick="switchTab('calendar')">📆 تقویم</button>
                <button class="tab" data-tab="finance" onclick="switchTab('finance')">💰 مالی</button>
            </div>

            <!-- ===== تب داشبورد (صفحه اول) ===== -->
            <div id="tab-dashboard" class="tab-content active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h3>📊 داشبورد</h3>
                    <button class="btn btn-primary" onclick="showQuickAddEvent()">➕ رویداد جدید</button>
                </div>

                <!-- خلاصه آماری -->
                <div class="grid-3" style="margin-bottom: 20px;">
                    <div class="card" style="text-align: center;">
                        <div style="font-size: 32px;">🎯</div>
                        <div style="font-size: 24px; font-weight: 700; color: #667eea;" id="dash-goals-count">0</div>
                        <div style="color: #6b7280;">هدف</div>
                    </div>
                    <div class="card" style="text-align: center;">
                        <div style="font-size: 32px;">📋</div>
                        <div style="font-size: 24px; font-weight: 700; color: #10b981;" id="dash-tasks-count">0</div>
                        <div style="color: #6b7280;">فعالیت</div>
                    </div>
                    <div class="card" style="text-align: center;">
                        <div style="font-size: 32px;">📅</div>
                        <div style="font-size: 24px; font-weight: 700; color: #f59e0b;" id="dash-events-count">0</div>
                        <div style="color: #6b7280;">رویداد امروز</div>
                    </div>
                </div>

                <!-- تقویم در صفحه اول -->
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                        <h4>📆 تقویم</h4>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">◀</button>
                            <span style="font-weight: 600; font-size: 16px;" id="calendar-month-label"></span>
                            <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">▶</button>
                            <button class="btn btn-primary btn-sm" onclick="showQuickAddEvent()">➕</button>
                        </div>
                    </div>
                    <div id="dashboard-calendar"></div>
                </div>

                <!-- رویدادهای امروز -->
                <div class="card">
                    <h4>📋 رویدادهای امروز</h4>
                    <div id="today-events"></div>
                </div>
            </div>

            <!-- ===== تب اهداف ===== -->
            <div id="tab-goals" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h3>🎯 اهداف و پروژه‌ها</h3>
                    <button class="btn btn-primary" onclick="showAddGoal()">+ هدف جدید</button>
                </div>
                <div id="goals-container">در حال بارگذاری...</div>
            </div>

            <!-- ===== تب تقویم ===== -->
            <div id="tab-calendar" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h3>📆 تقویم و رویدادها</h3>
                    <button class="btn btn-primary" onclick="showAddEvent()">+ رویداد جدید</button>
                </div>
                <div id="calendar-container">در حال بارگذاری...</div>
            </div>

            <!-- ===== تب مالی ===== -->
            <div id="tab-finance" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
                    <h3>💰 وضعیت مالی</h3>
                    <button class="btn btn-primary" onclick="showAddFinance()">+ ثبت مالی</button>
                </div>
                <div id="finance-container">در حال بارگذاری...</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // تنظیمات Supabase
        // ============================================================
        const SUPABASE_URL = 'https://hcrvxbjwsxmdzamkuwhl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-5k5xY6eWyBTrAvNIt-_iQ_8Ax6P9EW';

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let currentDate = new Date();
        let allEvents = [];
        let allGoals = [];
        let allActivities = [];

        // ============================================================
        // توابع احراز هویت
        // ============================================================
        function showAuthMessage(message, isError = false) {
            const msgDiv = document.getElementById('auth-message');
            msgDiv.innerHTML = `<div style="padding: 12px; border-radius: 8px; background: ${isError ? '#fee2e2' : '#d1fae5'}; color: ${isError ? '#991b1b' : '#065f46'};">${message}</div>`;
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if (!email || !password) {
                showAuthMessage('لطفاً ایمیل و رمز عبور را وارد کنید.', true);
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                showAuthMessage('❌ ' + error.message, true);
                return;
            }
            currentUser = data.user;
            showAuthMessage('✅ ورود موفق!', false);
            loadPlanner();
        }

        async function register() {
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            if (!email || !password) {
                showAuthMessage('لطفاً ایمیل و رمز عبور را وارد کنید.', true);
                return;
            }
            if (password.length < 6) {
                showAuthMessage('رمز عبور باید حداقل ۶ کاراکتر باشد.', true);
                return;
            }
            
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) {
                showAuthMessage('❌ ' + error.message, true);
                return;
            }
            currentUser = data.user;
            showAuthMessage('✅ ثبت‌نام موفق! لطفاً وارد شوید.', false);
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-email').value = email;
        }

        function logout() {
            supabaseClient.auth.signOut();
            currentUser = null;
            document.getElementById('planner-section').classList.add('hidden');
            document.getElementById('auth-section').classList.remove('hidden');
        }

        // ============================================================
        // توابع اصلی
        // ============================================================
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            
            document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            if (tabId === 'dashboard') {
                updateDashboard();
            }
        }

        async function loadPlanner() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('planner-section').classList.remove('hidden');
            
            const user = (await supabaseClient.auth.getUser()).data.user;
            if (user) {
                document.getElementById('user-name').textContent = user.email.split('@')[0];
                await loadAllData();
                updateDashboard();
            }
        }

        async function loadAllData() {
            await loadGoals();
            await loadCalendarEvents();
            await loadFinance();
        }

        // ============================================================
        // توابع داشبورد
        // ============================================================
        function updateDashboard() {
            // آمار
            document.getElementById('dash-goals-count').textContent = allGoals.length;
            
            const totalActivities = allGoals.reduce((sum, goal) => {
                if (goal.projects) {
                    return sum + goal.projects.reduce((s, p) => s + (p.activities ? p.activities.length : 0), 0);
                }
                return sum;
            }, 0);
            document.getElementById('dash-tasks-count').textContent = totalActivities;
            
            const today = new Date().toISOString().split('T')[0];
            const todayEvents = allEvents.filter(e => e.start_time.startsWith(today));
            document.getElementById('dash-events-count').textContent = todayEvents.length;
            
            // نمایش تقویم
            renderCalendar('dashboard-calendar');
            
            // نمایش رویدادهای امروز
            renderTodayEvents();
        }

        function renderTodayEvents() {
            const container = document.getElementById('today-events');
            const today = new Date().toISOString().split('T')[0];
            const todayEvents = allEvents.filter(e => e.start_time.startsWith(today));
            
            if (todayEvents.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>هیچ رویدادی برای امروز ندارید</p>
                        <button class="btn btn-primary btn-sm" onclick="showQuickAddEvent()" style="margin-top: 10px;">➕ افزودن رویداد</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = todayEvents.map(e => `
                <div class="event-item">
                    <div class="event-info">
                        <div class="event-title">${e.title}</div>
                        <div class="event-time">

        function renderCalendar(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const month = currentDate.getMonth();
            const year = currentDate.getFullYear();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // تنظیم نام ماه
            const monthLabel = document.getElementById('calendar-month-label');
            if (monthLabel) {
                monthLabel.textContent = new Date(year, month).toLocaleDateString('fa-IR', { month: 'long', year: 'numeric' });
            }

            let html = `
                <div class="weekday-names">
                    ${['ش', 'ی', 'د', 'س', 'چ', 'پ', 'ج'].map(d => `<div>${d}</div>`).join('')}
                </div>
                <div class="calendar-grid">
            `;

            // روزهای خالی اول ماه
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;
            for (let i = 0; i < startOffset; i++) {
                html += `<div class="day" style="background: transparent; cursor: default;"></div>`;
            }

            // روزهای ماه
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateObj = new Date(year, month, day);
                const dateStr = dateObj.toISOString().split('T')[0];
                const isToday = dateStr === todayStr;
                const isWeekend = dateObj.getDay() === 5 || dateObj.getDay() === 6;
                const hasEvent = allEvents.some(e => e.start_time.startsWith(dateStr));
                
                html += `
                    <div class="day ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''} ${hasEvent ? 'has-event' : ''}" 
                         onclick="selectDate('${dateStr}')">
                        ${day}
                        ${hasEvent ? '<div class="event-dot"></div>' : ''}
                    </div>
                `;
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar('dashboard-calendar');
            renderCalendar('calendar-container');

        function selectDate(dateStr) {
            // نمایش رویدادهای اون روز
            const events = allEvents.filter(e => e.start_time.startsWith(dateStr));
            const dateObj = new Date(dateStr);
            const persianDate = dateObj.toLocaleDateString('fa-IR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            if (events.length === 0) {
                if (confirm(`📅 ${persianDate}\n\nهیچ رویدادی برای این تاریخ وجود ندارد.\nآیا می‌خواهید یک رویداد جدید اضافه کنید؟`)) {
                    showQuickAddEvent(dateStr);
                }
            } else {
                let message = `📅 ${persianDate}\n\nرویدادها:\n`;
                events.forEach((e, i) => {
                    message += `\n${i+1}. ${e.title}\n   ⏰ ${new Date(e.start_time).toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' })} - ${new Date(e.end_time).toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' })}\n`;
                });
                alert(message);
            }
        }

            allGoals = goals || [];

        function renderGoals() {
            const container = document.getElementById('goals-container');

            allGoals.forEach(goal => {
                const projects = goal.projects || [];
                const totalActivities = projects.reduce((s, p) => s + (p.activities ? p.activities.length : 0), 0);
                const doneActivities = projects.reduce((s, p) => {
                    return s + (p.activities ? p.activities.filter(a => a.is_done).length : 0);

                const progress = totalActivities > 0 ? Math.round((doneActivities / totalActivities) * 100) : 0;

                                const doneCount = activities.filter(a => a.is_done).length;
                                const prog = activities.length > 0 ? Math.round((doneCount / activities.length) * 100) : 0;

                                        <div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 10px;">

                                                    <span style="margin-right: 10px;">📊 ${prog}%</span>

                                                <button class="btn btn-danger btn-sm" onclick="deleteProject('${project.id}')">🗑</button>
                                            </div>
                                        </div>
                                        
                                        ${activities.length > 0 ?
                                            activities.map(activity => `
                                                <div class="card" style="margin-right: 20px; background: white;">
                                                    <div style="display: flex; justify-content: space-between; align-items: start; flex-wrap: wrap; gap: 10px;">
                                                        <div>
                                                            <h6>📋 ${activity.title}</h6>
                                                            ${activity.description ? `<p style="font-size: 13px; color: #6b7280;">${activity.description}</p>` : ''}

                                                            </button>
                                                            <button class="btn btn-danger btn-sm" onclick="deleteActivity('${activity.id}')">🗑</button>

            const title = document.getElementById('activity-title-input').value.trim();
            const description = document.getElementById('activity-desc-input').value.trim();
            const estimated_hours = parseFloat(document.getElementById('activity-hours-input').value) || 0;
            const estimated_cost = parseFloat(document.getElementById('activity-cost-input').value) || 0;

            if (!title) {
                alert('عنوان فعالیت الزامی است!');
                return;
            }

            const { error } = await supabaseClient.from('activities').insert({
                project_id: projectId,
                title,
                description: description || null,
                estimated_hours,
                estimated_cost,
                is_done: false
            });

            if (error) {
                alert('❌ خطا: ' + error.message);
                return;
            }

            await loadGoals();
            showAuthMessage('✅ فعالیت با موفقیت اضافه شد!', false);
        }

        async function toggleActivity(id, isDone) {
            const { error } = await supabaseClient.from('activities')
                .update({ is_done: isDone })
                .eq('id', id);

            if (error) {
                alert('❌ خطا: ' + error.message);
                return;
            }
            await loadGoals();
        }

        async function deleteActivity(id) {
            if (!confirm('آیا از حذف این فعالیت مطمئن هستید؟')) return;
            
            const { error } = await supabaseClient.from('activities').delete().eq('id', id);
            if (error) {
                alert('❌ خطا: ' + error.message);
                return;
            }
            await loadGoals();
        }

        // ============================================================
        // توابع مالی
        // ============================================================
        async function loadFinance() {
            const container = document.getElementById('finance-container');
            
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];

            const { data: finances, error } = await supabaseClient
                .from('daily_finance')
                .select('*')
                .gte('date', startOfMonth)
                .lte('date', endOfMonth)
                .order('date', { ascending: true });

            if (error) {
                container.innerHTML = `<div class="card" style="color:red;">❌ خطا: ${error.message}</div>`;
                return;
            }

            const totalIncome = (finances || []).reduce((sum, f) => sum + (f.income || 0), 0);
            const totalExpense = (finances || []).reduce((sum, f) => sum + (f.expense || 0), 0);
            const balance = totalIncome - totalExpense;

            let html = `
                <div class="finance-summary">
                    <div class="finance-card income">
                        <div class="label">💰 درآمد</div>
                        <div class="amount">${totalIncome.toLocaleString()}</div>
                    </div>
                    <div class="finance-card expense">
                        <div class="label">💸 هزینه</div>
                        <div class="amount">${totalExpense.toLocaleString()}</div>
                    </div>
                    <div class="finance-card balance">
                        <div class="label">📊 مانده</div>
                        <div class="amount" style="color: ${balance >= 0 ? '#065f46' : '#991b1b'}">${balance.toLocaleString()}</div>
                    </div>
                </div>
                <div style="margin-top: 20px;">
                    <h5>📋 گزارش روزانه</h5>
                    ${finances && finances.length > 0 ?
                        finances.map(f => `
                            <div class="card" style="padding: 12px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                                    <div>
                                        <strong>${new Date(f.date).toLocaleDateString('fa-IR')}</strong>
                                        ${f.note ? `<p style="font-size: 12px; color: #6b7280;">${f.note}</p>` : ''}
                                    </div>
                                    <div style="display: flex; gap: 15px; align-items: center;">
                                        <span style="color: #10b981; font-weight: 600;">+${(f.income || 0).toLocaleString()}</span>
                                        <span style="color: #ef4444; font-weight: 600;">-${(f.expense || 0).toLocaleString()}</span>
                                        <button class="btn btn-danger btn-sm" onclick="deleteFinance('${f.id}')">🗑</button>
                                    </div>
                                </div>
                            </div>
                        `).join('')
                    : '<p style="color: #9ca3af; padding: 20px; text-align: center;">هنوز داده مالی برای این ماه ثبت نشده است.</p>'}
                </div>
            `;

            container.innerHTML = html;
        }

        function showAddFinance() {
            const container = document.getElementById('finance-container');
            const today = new Date().toISOString().split('T')[0];
            
            container.innerHTML = `
                <div class="card fade-in" style="background: #f9fafb;">
                    <h4>💰 ثبت مالی روزانه</h4>
                    <div class="form-group">
                        <label>تاریخ</label>
                        <input type="date" id="finance-date-input" value="${today}">
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>درآمد (تومان)</label>
                            <input type="number" id="finance-income-input" placeholder="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>هزینه (تومان)</label>
                            <input type="number" id="finance-expense-input" placeholder="0" min="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>یادداشت</label>
                        <input id="finance-note-input" placeholder="مثلاً: حقوق، خرید مواد غذایی...">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-success" onclick="saveFinance()">💾 ذخیره</button>
                        <button class="btn btn-secondary" onclick="loadFinance()">انصراف</button>
                    </div>
                </div>
            `;
        }

        async function saveFinance() {
            const date = document.getElementById('finance-date-input').value;
            const income = parseFloat(document.getElementById('finance-income-input').value) || 0;
            const expense = parseFloat(document.getElementById('finance-expense-input').value) || 0;
            const note = document.getElementById('finance-note-input').value.trim();

            if (!date) {
                alert('تاریخ الزامی است!');
                return;
            }

            if (income === 0 && expense === 0) {
                alert('حداقل یکی از فیلدهای درآمد یا هزینه را پر کنید!');
                return;
            }

            const { data: existing } = await supabaseClient
                .from('daily_finance')
                .select('id')
                .eq('user_id', currentUser.id)
                .eq('date', date)
                .maybeSingle();

            let error;
            if (existing) {
                const { error: updateError } = await supabaseClient
                    .from('daily_finance')
                    .update({ income, expense, note: note || null })
                    .eq('id', existing.id);
                error = updateError;
            } else {
                const { error: insertError } = await supabaseClient
                    .from('daily_finance')
                    .insert({
                        user_id: currentUser.id,
                        date,
                        income,
                        expense,
                        note: note || null
                    });
                error = insertError;
            }

            if (error) {
                alert('❌ خطا: ' + error.message);
                return;
            }

            await loadFinance();
            showAuthMessage('✅ ثبت مالی با موفقیت انجام شد!', false);
        }

        async function deleteFinance(id) {
            if (!confirm('آیا از حذف این رکورد مالی مطمئن هستید؟')) return;
            
            const { error } = await supabaseClient.from('daily_finance').delete().eq('id', id);
            if (error) {
                alert('❌ خطا: ' + error.message);
                return;
            }
            await loadFinance();
            showAuthMessage('✅ رکورد مالی حذف شد.', false);
        }

        // ============================================================
        // بررسی وضعیت ورود هنگام بارگذاری
        // ============================================================
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                currentUser = session.user;
                loadPlanner();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        });

        console.log('🚀 پلنر شخصی با موفقیت بارگذاری شد!');
        console.log('📧 برای ورود از ایمیل و رمز عبور ثبت‌نامی استفاده کنید.');
    </script>
</body>
</html>
