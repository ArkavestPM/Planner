<!DOCTYPE html>
<html>
<head>
    <title>پلنر شخصی</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #333; }
        .status { color: #10b981; font-weight: bold; font-size: 24px; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            margin-top: 10px;
        }
        .btn:hover { background: #5a67d8; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📅 پلنر شخصی</h1>
        <div class="status">✅ سایت با موفقیت بارگذاری شد!</div>
        <p style="color: #6b7280; margin: 20px 0;">حالا می‌تونید از پلنر استفاده کنید.</p>
        <p style="font-size: 14px; color: #888;">آدرس: https://arkavestpm.github.io/Planner/</p>
        <a href="#" class="btn">ورود به پلنر</a>
        <p style="font-size: 12px; color: #aaa; margin-top: 20px;">در حال بارگذاری نسخه کامل...</p>
    </div>
</body>
</html>
